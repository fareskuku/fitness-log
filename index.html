<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💪 Fitness Log API</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-dumbbell"></i>
                <h1>Fitness <span>Log</span></h1>
            </div>
            <p class="tagline">Track, Monitor, and Achieve Your Fitness Goals</p>
        </div>

        <div class="stats-bar" id="statsBar">
            <div class="stat-card">
                <i class="fas fa-running"></i>
                <div class="stat-info">
                    <h3 id="totalWorkouts">0</h3>
                    <p>Total Workouts</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-fire"></i>
                <div class="stat-info">
                    <h3 id="totalCalories">0</h3>
                    <p>Calories Burned</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <div class="stat-info">
                    <h3 id="totalMinutes">0</h3>
                    <p>Minutes Active</p>
                </div>
            </div>
        </div>

        <div class="main-grid">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-plus-circle"></i>
                    <h2>Add New Workout</h2>
                </div>
                <form id="createForm">
                    <div class="form-group">
                        <label><i class="fas fa-futbol"></i> Exercise Type *</label>
                        <input type="text" id="exerciseType" required placeholder="e.g., Running, Swimming, Cycling">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-hourglass-half"></i> Duration (min) *</label>
                            <input type="number" id="duration" required placeholder="30">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-bolt"></i> Calories Burned</label>
                            <input type="number" id="caloriesBurned" placeholder="250">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-calendar"></i> Date *</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-chart-line"></i> Intensity</label>
                            <select id="intensity">
                                <option value="low">🟢 Low</option>
                                <option value="medium" selected>🟡 Medium</option>
                                <option value="high">🔴 High</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-pen"></i> Notes</label>
                        <textarea id="notes" rows="3" placeholder="Any notes about this workout..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Create Workout
                    </button>
                </form>
            </div>

            <div class="card">
                <div class="card-header">
                    <i class="fas fa-edit"></i>
                    <h2>Manage Workout</h2>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-hashtag"></i> Workout ID *</label>
                    <input type="number" id="updateId" placeholder="Enter workout ID">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-futbol"></i> Exercise Type</label>
                    <input type="text" id="updateExerciseType" placeholder="New exercise type">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-hourglass-half"></i> Duration (min)</label>
                        <input type="number" id="updateDuration" placeholder="Duration">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-bolt"></i> Calories</label>
                        <input type="number" id="updateCaloriesBurned" placeholder="Calories">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Date</label>
                        <input type="date" id="updateDate">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-chart-line"></i> Intensity</label>
                        <select id="updateIntensity">
                            <option value="">Select</option>
                            <option value="low">🟢 Low</option>
                            <option value="medium">🟡 Medium</option>
                            <option value="high">🔴 High</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-pen"></i> Notes</label>
                    <textarea id="updateNotes" rows="2" placeholder="New notes..."></textarea>
                </div>
                <div class="button-group">
                    <button class="btn btn-update" onclick="updateWorkout()">
                        <i class="fas fa-pen"></i> Update
                    </button>
                    <button class="btn btn-delete" onclick="deleteWorkout()">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>
        </div>

        <div class="card full-width">
            <div class="card-header">
                <i class="fas fa-list"></i>
                <h2>Your Workouts</h2>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="number" id="searchId" placeholder="Search by ID...">
                    <button onclick="searchWorkout()" class="btn-small">Search</button>
                    <button onclick="loadAllWorkouts()" class="btn-small btn-outline">Show All</button>
                </div>
            </div>
            <div id="workoutsList" class="workouts-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading workouts...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/js/script.js"></script>
</body>
</html>
